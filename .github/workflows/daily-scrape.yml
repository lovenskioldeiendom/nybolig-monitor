name: Daglig nyboligscraping

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 06:00 norsk vintertid
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper.run

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nybolig.db dashboard/index.html
          git diff --staged --quiet || git commit -m "Daglig oppdatering $(date -u +%Y-%m-%d)"
          git push
